;自用Clash订阅转换，大陆走直连，🐟 漏网之鱼设置为代理
;Date: 2026-02-13
;作者：https://github.com/Charles94jp
;项目地址：https://github.com/Charles94jp/Clash


[custom]
;===========================================================
;1)设置规则
;===========================================================
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果


;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;Aethersailor收录的直连规则
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
;Aethersailor收录的代理规则
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest

;=============================== custom start ====================================
;自定义分流修改这里
;===============

;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=💬 即时通讯,[]GEOSITE,category-communication
# ChatGPT、Gemini、Copilot
ruleset=🤖 人工智能,[]GEOSITE,category-ai-!cn
ruleset=🤖 人工智能,[]GEOSITE,jetbrains-ai
;必须分出来因为GEOSITE中GitHub bing copilot都属于微软服务
ruleset=🐱 GitHub,[]GEOSITE,github
;手机安装了Loon、Surge插件，手机代理，则OpenClash看到的是去往代理节点的流量，无法分流
;ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🇬 谷歌服务,[]GEOSITE,google
;no-resolve
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve

;=============================== custom end ======================================

ruleset=🚀 手动选择,[]GEOSITE,gfw
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL



;===========================================================
;2)设置策略组，节点
;===========================================================
;节点地区分组参考本项目推荐机场而设立
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]⚡xlinkworld`[]🔋自动backup`[]🇭🇰 viking香港`[]🇼🇸 viking台湾`[]🇸🇬 viking新加坡`[]🇯🇵 viking日本`[]🇺🇸 viking美国`[]🇭🇰 xlinkworld香港`[]🇼🇸 xlinkworld台湾`[]🇸🇬 xlinkworld新加坡`[]🇯🇵 xlinkworld日本`[]🇺🇸 xlinkworld美国`[]🎯 全球直连`.*
#custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🎯 全球直连`[]🇭🇰 香港节点`[]🇸🇬 新加坡节点`[]🇯🇵 日本节点`[]🇰🇷 韩国节点`[]🇼🇸 台湾节点`[]🇺🇸 美国节点`[]🌐 其他地区`.*
;custom_proxy_group=🔯 故障转移`fallback`[]♻️ 自动选择`[]🔋自动backup`https://cp.cloudflare.com/generate_204`60,,50

;xlinkworld    (?i)(\[Anytls\])
;HK-02         viking
;aws|IPv6|hy2  飞鸟云
;流媒体          良心云
;IPLC-          猫熊
custom_proxy_group=♻️ 自动选择`url-test`((?i)(HK|JP|SG|TW)-\d\d)`https://cp.cloudflare.com/generate_204`120,,50
custom_proxy_group=⚡xlinkworld`url-test`(?i)(\[Anytls\])`https://cp.cloudflare.com/generate_204`30,,50
custom_proxy_group=🔋自动backup`url-test`((?i)aws|hy2|trojan)`https://cp.cloudflare.com/generate_204`60,,50

;飞鸟云AI            ^(?!.*(IPv6))(((日本|美国|新加坡).*(aws|BGP))|((hy2|trojan|vless).*(日本|美国|新加坡))).*$
;xlinkworld AI      ^(?!.*(香港|台湾|HK|TW|Taiwan|HongKong)).*\[Anytls\].*$
custom_proxy_group=🤖 人工智能`select`[]🛸AI自动选择`[]🛰️AI自动backup`[]🚀 手动选择`[]🇸🇬 viking新加坡`[]🇯🇵 viking日本`[]🇺🇸 viking美国`[]🇸🇬 xlinkworld新加坡`[]🇯🇵 xlinkworld日本`[]🇺🇸 xlinkworld美国`.*
;custom_proxy_group=👾 AI故障转移`fallback`[]🛸AI自动选择`[]🛰️AI自动backup`https://cp.cloudflare.com/generate_204`60,,50
custom_proxy_group=🛸AI自动选择`url-test`((?i)(JP|SG|US)-\d\d)`https://cp.cloudflare.com/generate_204`120,,50
custom_proxy_group=🛰️AI自动backup`url-test`((?i)((日本|美国|新加坡).*aws)|((hy2|trojan).*(日本|美国|新加坡)))`https://cp.cloudflare.com/generate_204`60,,50

custom_proxy_group=🇬 谷歌服务`select`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🐱 GitHub`select`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]🎯 全球直连
custom_proxy_group=💬 即时通讯`select`[]🚀 手动选择`[]♻️ 自动选择
custom_proxy_group=🌐 社交媒体`select`[]🚀 手动选择`[]♻️ 自动选择
;custom_proxy_group=🎻 Spotify`select`[]🚀 手动选择`[]🎯 全球直连
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 手动选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 手动选择
custom_proxy_group=🚀 测速工具`select`[]🎯 全球直连`[]🚀 手动选择
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]🎯 全球直连
;(非大陆使用|回国)为排除节点


